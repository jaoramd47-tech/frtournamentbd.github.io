<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRTOURNAMENTBD.COM - ফ্রি ফায়ার টুর্নামেন্ট</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --secondary: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --text-light: #94a3b8;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, var(--dark), #1a1f35);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
        }

        .logo i {
            font-size: 2.2rem;
            color: var(--warning);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        /* Hero Section */
        .hero {
            padding: 4rem 5%;
            text-align: center;
            background: radial-gradient(circle at top right, rgba(124, 58, 237, 0.1), transparent 50%);
        }

        .hero h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, var(--primary), var(--warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--text-light);
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        /* Download Section */
        .download-section {
            padding: 4rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.8rem;
            color: white;
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
        }

        .section-title span {
            color: var(--primary);
            position: relative;
        }

        .section-title span::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--warning));
            border-radius: 2px;
        }

        .download-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .download-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: 0.3s;
            text-align: center;
        }

        .download-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 30px 60px rgba(124, 58, 237, 0.3);
        }

        .app-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--warning));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 4rem;
            color: white;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5);
        }

        .download-card h2 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .version {
            background: var(--dark);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 1.5rem;
            border: 1px solid var(--primary);
            color: var(--text-light);
        }

        .features-list {
            text-align: left;
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .features-list li {
            list-style: none;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-light);
        }

        .features-list i {
            color: var(--secondary);
        }

        .download-btn {
            background: linear-gradient(135deg, var(--primary), var(--warning));
            color: white;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.3rem;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            margin: 1rem 0;
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.4);
        }

        .qr-section {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            text-align: center;
        }

        .qr-code {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            display: inline-block;
            margin: 2rem auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .qr-code img {
            width: 200px;
            height: 200px;
            display: block;
        }

        .scan-text {
            color: var(--text-light);
            font-size: 1.2rem;
            margin: 1rem 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* Features Section */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .feature-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
