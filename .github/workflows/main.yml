        document.getElementById('downloadLink').href = APP_URL;
        
        // QR Code আপডেট করা
        document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(APP_URL)}`;

        // Share Functions
        function shareOnFacebook() {
            const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(APP_URL)}`;
            window.open(url, '_blank', 'width=600,height=400');
            showAlert('Facebook এ শেয়ার করা হচ্ছে...');
        }

        function shareOnTelegram() {
            const url = `https://t.me/share/url?url=${encodeURIComponent(APP_URL)}&text=${encodeURIComponent('FR TOURNAMENT BD অ্যাপ ডাউনলোড করুন!')}`;
            window.open(url, '_blank');
            showAlert('Telegram এ শেয়ার করা হচ্ছে...');
        }

        function shareOnWhatsapp() {
            const url = `https://wa.me/?text=${encodeURIComponent('FR TOURNAMENT BD অ্যাপ ডাউনলোড করুন: ' + APP_URL)}`;
            window.open(url, '_blank');
            showAlert('WhatsApp এ শেয়ার করা হচ্ছে...');
        }

        // Alert Function
        function showAlert(message) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 2000);
        }

        // Smooth Scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
