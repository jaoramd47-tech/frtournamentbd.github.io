            background: rgba(30, 41, 59, 0.95);
            padding: 3rem 5%;
            margin-top: 4rem;
            border-top: 2px solid var(--primary);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
